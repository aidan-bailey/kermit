name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  version:
    name: Get Version
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Get commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' kermit/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release v${{ steps.version.outputs.version }} already exists, skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release v${{ steps.version.outputs.version }} will be created"
          fi

  publish:
    name: Publish to crates.io
    if: |
      needs.version.outputs.should_release == 'true' &&
      github.repository == 'aidan-bailey/kermit'
    needs: version
    runs-on: ubuntu-latest
    environment: cargo
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Publish in dependency order: iters -> derive -> parser -> ds -> algos -> bench -> kermit
      - name: Publish crates to crates.io
        run: |
          CRATES=("kermit-iters" "kermit-derive" "kermit-parser" "kermit-ds" "kermit-algos" "kermit-bench" "kermit")

          for crate in "${CRATES[@]}"; do
            CRATE_VERSION=$(grep -m1 '^version' "$crate/Cargo.toml" | sed 's/.*"\(.*\)".*/\1/')
            echo "Publishing $crate $CRATE_VERSION"
            OUTPUT=$(cargo publish -p "$crate" --no-verify 2>&1) && {
              echo "$crate $CRATE_VERSION published successfully"
              continue
            }
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "$crate $CRATE_VERSION already exists, skipping"
              continue
            fi
            echo "::error::Failed to publish $crate"
            echo "$OUTPUT"
            exit 1
          done

  release:
    name: Create Release
    needs: [version, publish]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.version.outputs.version }}" -m "Release v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
          version: v2.11.0

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
