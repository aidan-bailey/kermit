name: Build and Test master

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: master-${{ github.sha }}
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - run: cargo build --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - run: cargo test --verbose

  clippy:
    name: Lint with clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
          components: clippy
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - run: cargo clippy --all-targets --verbose

  rustfmt:
    name: Verify code formatting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Verify crate documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTFLAGS: -Dwarnings
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - run: cargo doc --workspace

  miri:
    name: Check for undefined behaviour with miri
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - run: cargo miri setup
      - run: cargo miri test

  publish:

    if: github.repository == 'aidan-bailey/kermit'

    needs: [build, test, clippy, rustfmt, doc, miri]

    runs-on: ubuntu-latest
    timeout-minutes: 30

    name: 'publish'

    environment: cargo

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Publish kermit-iters
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-iters/
          TAG_PREFIX: kermit-iters

      - name: Publish kermit-derive
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-derive/
          TAG_PREFIX: kermit-derive

      - name: Publish kermit-parser
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-parser/
          TAG_PREFIX: kermit-parser

      - name: Publish kermit-ds
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-ds/
          TAG_PREFIX: kermit-ds

      - name: Publish kermit-algos
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-algos/
          TAG_PREFIX: kermit-algos

      - name: Publish kermit-bench
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-bench/
          TAG_PREFIX: kermit-bench

      - name: Publish kermit
        uses: tu6ge/publish-action@dbd1b99d919aa888c7a1dc7f42038ba1c49976c8 # v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit/
          TAG_PREFIX: kermit

  release:

    if: github.repository == 'aidan-bailey/kermit'

    needs: publish

    runs-on: ubuntu-latest
    timeout-minutes: 10

    name: 'release'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Get kermit version
        id: version
        run: |
          VERSION=$(grep '^version' kermit/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="kermit${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" &>/dev/null; then
            if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        if: steps.check.outputs.should_release == 'true'
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --latest --strip header --tag-pattern "^kermit[0-9]"
          output: RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "kermit ${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
