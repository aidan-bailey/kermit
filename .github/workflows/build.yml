name: Build and Test master

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: nightly
      - run: cargo build --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: nightly
      - run: cargo test --verbose

  publish:

    if: github.repository == 'aidan-bailey/kermit'

    needs: [build, test]
  
    runs-on: ubuntu-latest

    name: 'publish'

    environment: cargo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish kermit-iters
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-iters/
          TAG_PREFIX: kermit-iters

      - name: Publish kermit-derive
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-derive/
          TAG_PREFIX: kermit-derive

      - name: Publish kermit-parser
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-parser/
          TAG_PREFIX: kermit-parser

      - name: Publish kermit-ds
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-ds/
          TAG_PREFIX: kermit-ds

      - name: Publish kermit-algos
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-algos/
          TAG_PREFIX: kermit-algos

      - name: Publish kermit-bench
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit-bench/
          TAG_PREFIX: kermit-bench

      - name: Publish kermit
        uses: tu6ge/publish-action@v0.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: /kermit/
          TAG_PREFIX: kermit

  release:

    if: github.repository == 'aidan-bailey/kermit'

    needs: publish

    runs-on: ubuntu-latest

    name: 'release'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Get kermit version
        id: version
        run: |
          VERSION=$(grep '^version' kermit/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="kermit${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" &>/dev/null; then
            if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        if: steps.check.outputs.should_release == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --tag-pattern "^kermit[0-9]"
          output: RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "kermit ${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
